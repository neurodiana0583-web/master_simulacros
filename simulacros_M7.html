<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulacros M7 — Trastornos del Lenguaje</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #1a0f0f;
    --bg2:      #251515;
    --bg3:      #2e1a1a;
    --rose:     #c0524a;
    --rose2:    #e07060;
    --amber:    #d4923a;
    --amber2:   #f0b060;
    --cream:    #f2ebe0;
    --cream2:   #e0d5c5;
    --red:      #e05050;
    --green:    #4caf80;
    --muted:    #8a7070;
    --border:   rgba(192,82,74,.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--cream);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--bg2);
    border-bottom: 2px solid var(--rose);
    padding: 16px 32px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    color: var(--amber);
    letter-spacing: .02em;
  }
  .header-sub { font-size: .76rem; color: var(--rose2); margin-top: 2px; }
  .header-badge {
    background: var(--rose);
    color: #fff;
    font-size: .72rem;
    padding: 4px 14px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: .06em;
  }

  /* HOME */
  #home { max-width: 800px; margin: 0 auto; padding: 52px 24px; }
  .home-hero { text-align: center; margin-bottom: 52px; }
  .home-hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.8rem;
    color: var(--amber);
    line-height: 1.15;
  }
  .home-hero h1 em { color: var(--rose2); font-style: italic; }
  .home-hero p { color: var(--cream2); font-size: .95rem; margin-top: 14px; opacity: .8; }
  .ornament { color: var(--rose); font-size: 1.2rem; margin: 12px 0; letter-spacing: .3em; }

  .sim-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 16px; }
  .sim-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 26px 22px;
    cursor: pointer;
    transition: all .22s ease;
    position: relative;
    overflow: hidden;
  }
  .sim-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--rose), var(--amber));
    transform: scaleX(0);
    transition: transform .25s ease;
    transform-origin: left;
  }
  .sim-card:hover { border-color: var(--rose2); transform: translateY(-3px); box-shadow: 0 10px 32px rgba(0,0,0,.5); }
  .sim-card:hover::after { transform: scaleX(1); }
  .sim-num {
    font-family: 'DM Serif Display', serif;
    font-size: 2.4rem;
    color: var(--rose2);
    line-height: 1;
  }
  .sim-label { font-size: .8rem; color: var(--amber); margin-top: 5px; text-transform: uppercase; letter-spacing: .1em; font-weight: 600; }
  .sim-count { font-size: .76rem; color: var(--muted); margin-top: 8px; }
  .sim-score-badge { display: none; margin-top: 10px; font-size: .78rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; width: fit-content; }
  .sim-score-badge.shown { display: inline-block; }
  .sim-score-badge.pass { background: rgba(76,175,128,.2); color: #7de0a8; border: 1px solid #4caf80; }
  .sim-score-badge.fail { background: rgba(224,80,80,.18); color: #e08080; border: 1px solid var(--red); }
  .sim-score-badge.partial { background: rgba(212,146,58,.2); color: var(--amber2); border: 1px solid var(--amber); }

  /* QUIZ */
  #quiz { display: none; max-width: 760px; margin: 0 auto; padding: 32px 24px 80px; }
  .quiz-nav { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
  .btn-back {
    background: none; border: 1px solid rgba(255,255,255,.18);
    color: var(--cream); padding: 7px 16px; border-radius: 8px;
    cursor: pointer; font-size: .82rem; transition: .2s;
  }
  .btn-back:hover { border-color: var(--rose2); color: var(--rose2); }
  .quiz-title { font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: var(--amber); flex: 1; }

  .progress-wrap { margin-bottom: 26px; }
  .progress-meta { display: flex; justify-content: space-between; font-size: .76rem; color: var(--muted); margin-bottom: 6px; }
  .progress-bar { height: 5px; background: rgba(255,255,255,.08); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--rose), var(--amber)); border-radius: 4px; transition: width .4s ease; }

  .q-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    margin-bottom: 20px;
  }
  .q-number { font-size: .73rem; text-transform: uppercase; letter-spacing: .12em; color: var(--rose2); margin-bottom: 12px; font-weight: 600; }
  .q-text { font-size: 1.05rem; line-height: 1.7; color: var(--cream); margin-bottom: 28px; font-weight: 300; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    display: flex; align-items: flex-start; gap: 14px;
    background: rgba(255,255,255,.03);
    border: 1.5px solid rgba(255,255,255,.1);
    border-radius: 10px; padding: 14px 16px;
    cursor: pointer; text-align: left;
    color: var(--cream); font-family: 'DM Sans', sans-serif;
    font-size: .92rem; line-height: 1.5;
    transition: all .17s ease;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--rose2); background: rgba(192,82,74,.12); }
  .opt-btn:disabled { cursor: default; }
  .opt-letter {
    min-width: 27px; height: 27px; border-radius: 6px;
    background: rgba(255,255,255,.08);
    display: flex; align-items: center; justify-content: center;
    font-size: .76rem; font-weight: 700; letter-spacing: .05em;
    flex-shrink: 0; margin-top: 1px; transition: .17s;
  }
  .opt-btn.selected-correct { border-color: var(--green); background: rgba(76,175,128,.12); }
  .opt-btn.selected-correct .opt-letter { background: var(--green); color: #fff; }
  .opt-btn.selected-wrong { border-color: var(--red); background: rgba(224,80,80,.12); }
  .opt-btn.selected-wrong .opt-letter { background: var(--red); color: #fff; }
  .opt-btn.show-correct { border-color: var(--green); background: rgba(76,175,128,.06); }
  .opt-btn.show-correct .opt-letter { background: rgba(76,175,128,.35); color: #fff; }

  .feedback-box {
    display: none; margin-top: 16px; padding: 14px 18px;
    border-radius: 10px; font-size: .88rem; line-height: 1.6;
    animation: fadeUp .3s ease;
  }
  .feedback-box.correct { background: rgba(76,175,128,.1); border: 1px solid rgba(76,175,128,.4); color: #7de0a8; }
  .feedback-box.wrong { background: rgba(224,80,80,.1); border: 1px solid rgba(224,80,80,.4); color: #e08080; }
  .feedback-ref { font-size: .77rem; margin-top: 5px; opacity: .65; font-style: italic; }

  .quiz-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
  .btn-primary {
    background: var(--rose); color: #fff; border: none;
    padding: 12px 28px; border-radius: 10px; cursor: pointer;
    font-size: .9rem; font-weight: 600; letter-spacing: .04em;
    transition: .2s; font-family: 'DM Sans', sans-serif;
  }
  .btn-primary:hover { background: var(--rose2); }
  .btn-primary:disabled { opacity: .35; cursor: default; }
  .btn-secondary {
    background: none; border: 1.5px solid var(--amber); color: var(--amber);
    padding: 11px 22px; border-radius: 10px; cursor: pointer;
    font-size: .88rem; font-weight: 600; transition: .2s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-secondary:hover { background: rgba(212,146,58,.12); }

  /* RESULTS */
  #results { display: none; max-width: 680px; margin: 0 auto; padding: 48px 24px 80px; }
  .results-header { text-align: center; margin-bottom: 40px; }
  .results-score-ring {
    width: 130px; height: 130px; border-radius: 50%;
    margin: 0 auto 20px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
  }
  .results-score-ring.pass { background: radial-gradient(circle, rgba(76,175,128,.2), transparent); border: 3px solid var(--green); }
  .results-score-ring.fail { background: radial-gradient(circle, rgba(224,80,80,.2), transparent); border: 3px solid var(--red); }
  .results-score-ring.partial { background: radial-gradient(circle, rgba(212,146,58,.2), transparent); border: 3px solid var(--amber); }
  .score-pct { font-size: 2.5rem; font-weight: 700; }
  .score-pct.pass { color: #7de0a8; }
  .score-pct.fail { color: #e08080; }
  .score-pct.partial { color: var(--amber2); }
  .score-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; opacity: .6; }
  .results-title { font-family: 'DM Serif Display', serif; font-size: 1.9rem; color: var(--amber); margin-bottom: 8px; }
  .results-meta { font-size: .88rem; color: var(--muted); }

  .results-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin: 30px 0; }
  .stat-box { background: var(--bg2); border: 1px solid rgba(255,255,255,.08); border-radius: 10px; padding: 16px; text-align: center; }
  .stat-val { font-family: 'DM Serif Display', serif; font-size: 1.9rem; }
  .stat-val.green { color: #7de0a8; }
  .stat-val.red { color: #e08080; }
  .stat-val.amber { color: var(--amber2); }
  .stat-lbl { font-size: .72rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .07em; }

  .review-section { margin-top: 32px; }
  .review-title { font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: var(--amber); margin-bottom: 16px; }
  .review-item {
    background: var(--bg2); border-radius: 10px;
    padding: 16px 18px; margin-bottom: 10px;
    border-left: 4px solid transparent; font-size: .87rem; line-height: 1.55;
  }
  .review-item.correct { border-color: var(--green); }
  .review-item.wrong { border-color: var(--red); }
  .review-item-q { color: var(--cream); margin-bottom: 6px; font-weight: 500; }
  .review-item-ans { font-size: .81rem; margin-top: 4px; }
  .review-item-ans .my { color: #e08080; }
  .review-item-ans .ok { color: #7de0a8; }
  .review-item-retro { font-size: .78rem; color: var(--muted); margin-top: 4px; font-style: italic; }

  .results-actions { display: flex; gap: 14px; justify-content: center; margin-top: 32px; flex-wrap: wrap; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeUp .35s ease; }

  @media (max-width: 540px) {
    .home-hero h1 { font-size: 2rem; }
    .q-card { padding: 22px 16px; }
    .results-stats { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Simulacros M7</div>
    <div class="header-sub">Trastornos del lenguaje</div>
  </div>
  <div class="header-badge">5 × 30 preguntas</div>
</div>

<!-- HOME -->
<div id="home">
  <div class="home-hero">
    <div class="ornament">◆ ◆ ◆</div>
    <h1>Banco de <em>Simulacros</em></h1>
    <p>Selecciona un simulacro para comenzar tu práctica.<br>Cada uno contiene 30 preguntas de opción múltiple.</p>
  </div>
  <div class="sim-grid" id="simGrid"></div>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="quiz-nav">
    <button class="btn-back" onclick="goHome()">← Inicio</button>
    <div class="quiz-title" id="quizTitle"></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="progressText">Pregunta 1 de 30</span>
      <span id="scoreText">0 correctas</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div id="qWrap"></div>
</div>

<!-- RESULTS -->
<div id="results">
  <div class="results-header">
    <div class="results-score-ring" id="scoreRing">
      <div class="score-pct" id="scorePct"></div>
      <div class="score-label">puntuación</div>
    </div>
    <div class="results-title" id="resultsTitle"></div>
    <div class="results-meta" id="resultsMeta"></div>
  </div>
  <div class="results-stats">
    <div class="stat-box"><div class="stat-val green" id="statCorr">0</div><div class="stat-lbl">Correctas</div></div>
    <div class="stat-box"><div class="stat-val red" id="statWrong">0</div><div class="stat-lbl">Incorrectas</div></div>
    <div class="stat-box"><div class="stat-val amber" id="statPct">0%</div><div class="stat-lbl">Porcentaje</div></div>
  </div>
  <div class="review-section">
    <div class="review-title">📋 Revisión detallada</div>
    <div id="reviewList"></div>
  </div>
  <div class="results-actions">
    <button class="btn-secondary" onclick="retryQuiz()">🔁 Repetir simulacro</button>
    <button class="btn-primary" onclick="goHome()">← Volver al inicio</button>
  </div>
</div>

<script>
const SIMS = [
  [
    {id:80,p:'¿Qué repercusión tiene la mejora en el lenguaje de los implantados cocleares precoces?',a:'Dificultad para comprender el entorno.',b:'Pobre dominio del lenguaje oral.',c:'Problemas de aprendizaje.',d:'Mejora en la socialización.',ok:'D',r:'Correcta: D. Mejora en la socialización.',ref:'(M7, p. 1)'},
    {id:125,p:'¿Cuál es una enfermedad infecciosa producida por uno de tres tipos de virus que tienen afinidad por las astas anteriores de la médula espinal?',a:'Esclerosis Lateral Amiotrófica.',b:'Esclerosis Múltiple.',c:'Parálisis infantil.',d:'Ataxia de Friedreich.',ok:'C',r:'Correcta: C. Parálisis infantil.',ref:'(M7, p. 1)'},
    {id:102,p:'¿Qué dificultades en el lenguaje presentan los niños con el síndrome de Prader Willi?',a:'Fluidez verbal.',b:'Ausencia de problemas articulatorios.',c:'Dificultades fonéticas.',d:'Voz clara y modulada.',ok:'C',r:'Correcta: C. Dificultades fonéticas.',ref:'(M7, p. 1)'},
    {id:149,p:'¿Cuáles son las características del lenguaje hablado en individuos con TDI Grave?',a:'Completo y fluido.',b:'Limitado en vocabulario y gramática.',c:'Centrado en la comunicación escrita.',d:'Rico en expresiones y metáforas.',ok:'B',r:'Correcta: B. Limitado en vocabulario y gramática.',ref:'(M7, p. 1)'},
    {id:19,p:'¿Cuál es uno de los síntomas del trastorno del lenguaje receptivo-expresivo?',a:'Problemas de audición.',b:'Problemas de memoria.',c:'Dificultad para socializarse.',d:'Habilidad para comprender el humor.',ok:'C',r:'Correcta: C. Dificultad para socializarse.',ref:'(M7, p. 1)'},
    {id:59,p:'¿Cuál es el tipo de dislexia caracterizado por dificultades en la conversión grafema-fonema de palabras regulares?',a:'Dislexia fonológica.',b:'Dislexia mixta.',c:'Dislexia profunda.',d:'Dislexia semántica.',ok:'A',r:'Correcta: A. Dislexia fonológica.',ref:'(M7, p. 1)'},
    {id:106,p:'Según el DSMV, ¿cómo se describen las patologías de la comunicación de carácter congénito?',a:'Afectadas por las neurociencias.',b:'Consideradas desde las contribuciones de las neurociencias.',c:'Influenciadas por las neurociencias.',d:'Relacionadas con las neurociencias.',ok:'B',r:'Correcta: B. Consideradas desde las contribuciones de las neurociencias.',ref:'(M7, p. 1)'},
    {id:55,p:'¿Qué caracteriza a la dislexia?',a:'Influencia sobre la capacidad de lectura y escritura.',b:'Dificultad en el habla.',c:'Influencia en la capacidad de cálculo.',d:'Problemas en la memoria a largo plazo.',ok:'A',r:'Correcta: A. Influencia sobre la capacidad de lectura y escritura.',ref:'(M7, p. 1)'},
    {id:24,p:'¿Qué es la dislalia evolutiva?',a:'Una alteración permanente del lenguaje infantil.',b:'Una dificultad en la articulación de fonemas que persiste en la madurez.',c:'Una fase del desarrollo del lenguaje infantil en la que el niño no es capaz de repetir, por imitación, las palabras que escucha.',d:'Una alteración del habla que aparece en niños mayores de 5 años.',ok:'C',r:'Correcta: C. Una fase del desarrollo del lenguaje infantil en la que el niño no es capaz de repetir, por imitación, las palabras que escucha.',ref:'(M7, p. 1)'},
    {id:141,p:'¿Cuáles son las alteraciones más comunes en el lenguaje expresivo de niños con parálisis cerebral?',a:'Alteraciones en la visión.',b:'Alteraciones en la mímica facial.',c:'Alteraciones en la articulación.',d:'Alteraciones en la audición.',ok:'B',r:'Correcta: B. Alteraciones en la mímica facial.',ref:'(M7, p. 1)'},
    {id:15,p:'¿Qué trastorno se caracteriza por repetir sílabas y palabras enteras, sobre todo aquellas que contienen oclusivas y muchas consonantes?',a:'Mixta.',b:'Disfonía.',c:'Clónica.',d:'Taquifemia.',ok:'C',r:'Correcta: C. Clónica.',ref:'(M7, p. 1)'},

    {id:76,p:'¿Qué es la vocalización en la lectura?',a:'Relectura de palabras y frases.',b:'Hábito de apoyo indicador.',c:'Repetición verbal de palabras.',d:'Pronunciar mentalmente las palabras.',ok:'D',r:'Correcta: D. Pronunciar mentalmente las palabras.',ref:'(M7, p. 1)'},
    {id:101,p:'¿Cuál es una característica del síndrome de Williams en relación al lenguaje?',a:'Dificultades fonéticas.',b:'Lenguaje expresivo inferior al comprensivo.',c:'Retraso en la aparición del lenguaje.',d:'Habla rápida y entrecortada.',ok:'B',r:'Correcta: B. Lenguaje expresivo inferior al comprensivo.',ref:'(M7, p. 1)'},
    {id:93,p:'¿Cuáles son los aspectos que se pueden observar en el desarrollo de los diferentes niveles del lenguaje en niños con discapacidad intelectual?',a:'Aspectos morfológicos y léxicos.',b:'Aspectos fonéticos y fonológicos.',c:'Aspectos sintácticos y semánticos.',d:'Aspectos pragmáticos y discursivos.',ok:'B',r:'Correcta: B. Aspectos fonéticos y fonológicos.',ref:'(M7, p. 1)'},
    {id:148,p:'¿Cuál es una característica de los niños con TDI Grave?',a:'Rápido aprendizaje de hábitos de cuidado personal.',b:'Comunicación verbal limitada.',c:'Pronunciación clara y precisa.',d:'Buena memoria a largo plazo.',ok:'B',r:'Correcta: B. Comunicación verbal limitada.',ref:'(M7, p. 1)'},
    {id:94,p:'¿Cuál es uno de los prerrequisitos necesarios para un buen inicio del desarrollo lingüístico en niños con discapacidad intelectual?',a:'Habilidad para escribir correctamente.',b:'Vocabulario extenso.',c:'Maduración de las aptitudes locutivas.',d:'Comprensión del lenguaje.',ok:'C',r:'Correcta: C. Maduración de las aptitudes locutivas.',ref:'(M7, p. 1)'},
    {id:99,p:'¿Cuál es una característica de la etapa prelocutiva en niños con discapacidad intelectual?',a:'Dificultad para tomar una referencia conjunta.',b:'Buena capacidad para anticiparse lúdicamente en los juegos.',c:'Facilidad para establecer rutinas.',d:'Papel secundario de los padres como estimuladores del desarrollo cognitivo.',ok:'A',r:'Correcta: A. Dificultad para tomar una referencia conjunta.',ref:'(M7, p. 1)'},
    {id:17,p:'¿Qué es la disfasia?',a:'Pérdida parcial del habla.',b:'Alteración de la elaboración del lenguaje.',c:'Problemas de procesamiento del lenguaje.',d:'Retraso evolutivo del lenguaje.',ok:'A',r:'Correcta: A. Pérdida parcial del habla.',ref:'(M7, p. 1)'},
    {id:131,p:'¿Cuáles son las manifestaciones de la parálisis cerebral espástica?',a:'Movimientos bruscos y rápidos en las extremidades.',b:'Atrofia de fibras musculares.',c:'Debilidad y temblores en un lado del cuerpo.',d:'Resistencia al movimiento pasivo de un grupo muscular.',ok:'D',r:'Correcta: D. Resistencia al movimiento pasivo de un grupo muscular.',ref:'(M7, p. 1)'},
    {id:58,p:'¿Qué tipo de dislexia se caracteriza por tener deteriorada la ruta fonológica?',a:'Dislexia superficial.',b:'Dislexia visual.',c:'Dislexia fonológica.',d:'Dislexia profunda.',ok:'C',r:'Correcta: C. Dislexia fonológica.',ref:'(M7, p. 1)'},

let currentSim = 0, currentQ = 0, answers = [];
const LABELS = ['A','B','C','D'], KEYS = ['a','b','c','d'];

function getScores() { try { return JSON.parse(localStorage.getItem('m7_scores')||'{}'); } catch { return {}; } }
function saveScore(i, pct) { const s=getScores(); s[i]=pct; localStorage.setItem('m7_scores', JSON.stringify(s)); }

function renderHome() {
  const scores = getScores();
  const grid = document.getElementById('simGrid');
  grid.innerHTML = '';
  SIMS.forEach((sim, i) => {
    const card = document.createElement('div');
    card.className = 'sim-card';
    card.onclick = () => startQuiz(i);
    let badge = '';
    if (scores[i] !== undefined) {
      const p = scores[i];
      const cls = p >= 70 ? 'pass' : p >= 50 ? 'partial' : 'fail';
      badge = `<div class="sim-score-badge shown ${cls}">${p}% — ${p>=70?'✓ Aprobado':p>=50?'~ En progreso':'✗ A mejorar'}</div>`;
    }
    card.innerHTML = `<div class="sim-num">0${i+1}</div><div class="sim-label">Simulacro ${i+1}</div><div class="sim-count">30 preguntas · opción múltiple</div>${badge}`;
    grid.appendChild(card);
  });
}

function startQuiz(simIdx) {
  currentSim = simIdx; currentQ = 0;
  answers = new Array(SIMS[simIdx].length).fill(null);
  document.getElementById('home').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('quizTitle').textContent = `Simulacro ${simIdx+1}`;
  renderQuestion();
}

function renderQuestion() {
  const sim = SIMS[currentSim], q = sim[currentQ];
  const correct_so_far = answers.filter(a=>a&&a.correct).length;
  const pct = ((currentQ+1)/sim.length*100).toFixed(0);
  document.getElementById('progressText').textContent = `Pregunta ${currentQ+1} de ${sim.length}`;
  document.getElementById('scoreText').textContent = `${correct_so_far} correctas`;
  document.getElementById('progressFill').style.width = pct+'%';

  const savedAns = answers[currentQ];
  const opts = KEYS.map((k,i) => {
    let cls = '';
    if (savedAns) {
      const letter = LABELS[i];
      if (letter === q.ok) cls = savedAns.selected === letter ? 'selected-correct' : 'show-correct';
      else if (letter === savedAns.selected) cls = 'selected-wrong';
    }
    return `<button class="opt-btn ${cls}" onclick="selectAnswer('${LABELS[i]}')" ${savedAns?'disabled':''}><div class="opt-letter">${LABELS[i]}</div><div>${q[k]}</div></button>`;
  }).join('');

  let feedbackHTML = '';
  if (savedAns) {
    feedbackHTML = `<div class="feedback-box ${savedAns.correct?'correct':'wrong'}" style="display:block"><strong>${savedAns.correct?'✅ ¡Correcto!':'❌ Respuesta incorrecta'}</strong><br>${q.r}<div class="feedback-ref">${q.ref}</div></div>`;
  }

  const isLast = currentQ === sim.length - 1;
  const prevBtn = currentQ > 0 ? `<button class="btn-secondary" onclick="goToPrev()">← Anterior</button>` : `<div></div>`;

  document.getElementById('qWrap').innerHTML = `
    <div class="q-card fade-in">
      <div class="q-number">Pregunta ${currentQ+1}</div>
      <div class="q-text">${q.p}</div>
      <div class="options">${opts}</div>
      ${feedbackHTML}
    </div>
    <div class="quiz-actions">
      ${prevBtn}
      <button class="btn-primary" id="btnNext" onclick="goToNext()" ${!savedAns?'disabled':''}>${isLast?'🏁 Ver resultados':'Siguiente →'}</button>
    </div>`;
}

function selectAnswer(letter) {
  if (answers[currentQ] !== null) return;
  const q = SIMS[currentSim][currentQ];
  answers[currentQ] = { selected: letter, correct: letter === q.ok };
  renderQuestion();
}

function goToNext() {
  if (currentQ < SIMS[currentSim].length-1) { currentQ++; renderQuestion(); window.scrollTo({top:0,behavior:'smooth'}); }
  else showResults();
}
function goToPrev() {
  if (currentQ > 0) { currentQ--; renderQuestion(); window.scrollTo({top:0,behavior:'smooth'}); }
}

function showResults() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  window.scrollTo({top:0,behavior:'smooth'});
  const sim = SIMS[currentSim], total = sim.length;
  const correct = answers.filter(a=>a&&a.correct).length;
  const pct = Math.round(correct/total*100);
  saveScore(currentSim, pct);
  const cls = pct>=70?'pass':pct>=50?'partial':'fail';
  const msg = pct>=70?'¡Excelente trabajo!':pct>=50?'Buen intento, sigue practicando':'Necesitas repasar más';
  document.getElementById('scoreRing').className = 'results-score-ring '+cls;
  document.getElementById('scorePct').className = 'score-pct '+cls;
  document.getElementById('scorePct').textContent = pct+'%';
  document.getElementById('resultsTitle').textContent = msg;
  document.getElementById('resultsMeta').textContent = `Simulacro ${currentSim+1} · ${correct} de ${total} correctas`;
  document.getElementById('statCorr').textContent = correct;
  document.getElementById('statWrong').textContent = total-correct;
  document.getElementById('statPct').textContent = pct+'%';

  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  sim.forEach((q,i) => {
    const ans = answers[i]; if (!ans) return;
    const div = document.createElement('div');
    div.className = 'review-item '+(ans.correct?'correct':'wrong');
    const myText = ans.correct?'':`<div class="review-item-ans">❌ Tu respuesta: <span class="my">${ans.selected}. ${q[ans.selected.toLowerCase()]}</span></div>`;
    div.innerHTML = `<div class="review-item-q"><strong>${i+1}.</strong> ${q.p}</div>${myText}<div class="review-item-ans">${ans.correct?'✅':'✔'} Correcta: <span class="ok">${q.ok}. ${q[q.ok.toLowerCase()]}</span></div><div class="review-item-retro">${q.r} <em>${q.ref}</em></div>`;
    list.appendChild(div);
  });
}

function retryQuiz() { startQuiz(currentSim); }
function goHome() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('home').style.display = 'block';
  window.scrollTo({top:0,behavior:'smooth'});
  renderHome();
}

renderHome();
</script>
</body>
</html>
